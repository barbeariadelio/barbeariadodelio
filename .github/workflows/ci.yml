name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Typecheck
        run: npx turbo build -- --noEmit 2>/dev/null || npx tsc --noEmit -p server/tsconfig.json

      - name: Test
        run: npx turbo test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          MONGODB_URI: mongodb://localhost:27017/barber-test

      - name: Build
        run: npx turbo build

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
